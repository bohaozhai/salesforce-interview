        <!-- Root Cause -->
        <h2 class="readme-h2">Root Cause</h2>
        <p>
            All 6 failures are caused by a <strong>regression introduced by the <code>CampaignTrigger</code></strong>,
            which was added after this test class was written.
        </p>
        <p>
            The trigger enforces that <code>Campaign.StartDate</code> must be strictly in the future
            (<code>StartDate &gt; Date.today()</code>). The test data in <code>CSVContactImportControllerTest</code>
            uses hardcoded past dates (e.g. <code>2025-02-01</code>, <code>2025-03-01</code>) in the CSV campaign
            columns. When the controller attempts to insert these campaigns, the trigger rejects them with:
        </p>
        <pre class="readme-pre"><code>FIELD_CUSTOM_VALIDATION_EXCEPTION, Start Date must be in the future.: [StartDate]</code></pre>

        <hr />

        <!-- Your Task -->
        <h2 class="readme-h2">Your Task</h2>
        <p>
            The root cause is that <code>CSVContactImportController</code> <strong>owns its database operations
            directly</strong>. It calls <code>insert</code>, <code>upsert</code>, and SOQL inline across four
            private methods:
        </p>
        <table class="readme-table">
            <thead>
                <tr>
                    <th>Method</th>
                    <th>DML / SOQL</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><code>resolveAccounts()</code></td>
                    <td><code>SELECT Account</code>, <code>insert Account</code></td>
                </tr>
                <tr>
                    <td><code>resolveCampaigns()</code></td>
                    <td><code>SELECT Campaign</code>, <code>insert Campaign</code> ← fires <code>CampaignTrigger</code></td>
                </tr>
                <tr>
                    <td><code>importContacts()</code></td>
                    <td><code>SELECT Contact</code>, <code>upsert Contact</code></td>
                </tr>
                <tr>
                    <td><code>addCampaignMembersPerRow()</code></td>
                    <td><code>SELECT CampaignMember</code>, <code>insert CampaignMember</code></td>
                </tr>
            </tbody>
        </table>
        <p>
            Because the controller reaches directly for the database, every test must go through the
            database — and every <code>insert Campaign</code> fires <code>CampaignTrigger</code>. Tests have
            no way to bypass it.
        </p>
        <p>
            The controller should receive the service as an injected dependency rather than constructing
            its own database connection. In production the real service executes DML; in tests a stub
            returns in-memory data and captures mutations — <strong>without ever touching the database,
            so no trigger fires</strong>.
        </p>
