<template>
    <div class="readme-wrapper">

        <h1 class="readme-h1">CSV Contact Import</h1>

        <p>
            A Salesforce Lightning Web Component that allows sales users to import event participants from a CSV file.
            On upload, the component automatically creates or updates <strong>Contacts</strong>, <strong>Accounts</strong>,
            and <strong>Campaigns</strong>, and links each contact to their campaign as a <strong>CampaignMember</strong>.
        </p>

        <hr />

        <!-- Features -->
        <h2 class="readme-h2">Features</h2>
        <ul>
            <li>Drag-and-drop or browse CSV file upload</li>
            <li>Client-side preview of parsed rows before committing</li>
            <li>Upserts Contacts by email (creates new, updates existing)</li>
            <li>Creates Accounts by company name (reused if already exists)</li>
            <li>Creates Campaigns from CSV data (reused if name already exists)</li>
            <li>Links Contacts to their Campaign as <code>CampaignMember</code> (Status: <code>Responded</code>)</li>
            <li>Flexible header names — see <a href="#supported-column-headers">Supported Column Headers</a></li>
            <li>Result summary showing contacts created/updated, campaigns created, members linked</li>
            <li>Available as a tab in the <strong>Cartology Sales</strong> app</li>
        </ul>

        <hr />

        <!-- CSV Format -->
        <h2 class="readme-h2">CSV Format</h2>
        <p>
            The file must be a comma-separated <code>.csv</code> file with a header row.
            Column order does not matter. All headers are case-insensitive.
        </p>

        <h3 class="readme-h3">Example</h3>
        <pre class="readme-pre"><code>Title, First Name, Last Name, Email Address, Mobile Number, Company Name, Campaign Name, Start Date,  End Date,   Type
Mr.,   John,       Smith,     john@co.com,   0412345678,    Acme Corp,    Summer Conf,   2026-04-01, 2026-04-03, Conference
Ms.,   Jane,       Doe,       jane@co.com,   0498765432,    Beta Ltd,     Winter Expo,   2026-06-10, 2026-06-12, Seminar</code></pre>

        <hr />

        <!-- How to Use -->
        <h2 class="readme-h2">How to Use</h2>
        <ol>
            <li>Navigate to the <strong>Cartology Sales</strong> app</li>
            <li>Click the <strong>Import Contacts</strong> tab</li>
            <li>Drag and drop your <code>.csv</code> file onto the upload area, or click <strong>Browse File</strong></li>
            <li>Review the preview table to confirm the parsed data</li>
            <li>Click <strong>Import</strong></li>
            <li>Review the result summary — any skipped rows will be listed with a reason</li>
        </ol>

            raw content string to the Apex controller for processing.

                </tr>
            </tbody>
